<section aria-live="polite" aria-label="Lesson generation progress">
    <h2>{{ heading() }}</h2>

    <mfp-stepper [current]="currentStep()" orientation="vertical">
        <mfp-step label="Draft lesson"></mfp-step>
        <mfp-step label="Mastery check"></mfp-step>
        <mfp-step label="Quality gate" [error]="qualityFailed()"></mfp-step>
        <mfp-step label="Teacher review"></mfp-step>
        <mfp-step label="Finalize"></mfp-step>
    </mfp-stepper>
</section>
