<form (ngSubmit)="submit()" [formGroup]="form" novalidate>
    <h2>Generate a lesson</h2>

    <mfp-textarea
        label="Learning objective"
        rows="3"
        placeholder="e.g. Identify the main idea of a paragraph"
        formControlName="objective"
        [attr.hint]="
            form.controls.objective.invalid && form.controls.objective.touched
                ? null
                : 'What you want students to know or be able to do.'
        "
        [attr.error]="
            form.controls.objective.invalid && form.controls.objective.touched
                ? 'Please enter an objective of at least 8 characters.'
                : null
        "
    ></mfp-textarea>

    <div class="row">
        <mfp-select label="Grade level" formControlName="grade_level">
            @for (g of gradeLevels; track g) {
                <option [value]="g">{{ g }}</option>
            }
        </mfp-select>

        <mfp-select label="Subject" formControlName="subject">
            @for (s of subjects; track s) {
                <option [value]="s">{{ s }}</option>
            }
        </mfp-select>
    </div>

    <mfp-button
        type="submit"
        variant="primary"
        [attr.loading]="disabled() ? '' : null"
        [attr.disabled]="form.invalid ? '' : null"
    >
        Generate lesson
    </mfp-button>
</form>
